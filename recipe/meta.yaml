{% set name = "napari-vesicles-segmentation" %}
{% set version = "0.0.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/napari-vesicles-segmentation-{{ version }}.tar.gz
  sha256: 10f4144f86625cbda6c5a5b48d4cf13aac6c0274c01bab8bc5dc9efdcd72a08c

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 1
  script_env:
    - QT_QPA_PLATFORM=offscreen

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools-scm
  run:
    - magicgui
    - napari
    - numpy
    - python >={{ python_min }}
    - qtpy
    - scikit-image
    - scipy

test:
  imports:
    - napari_vesicles_segmentation
  commands:
    - pip list
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/alexisjapas/napari-vesicles-segmentation
  summary: A simple plugin to detect vesicles in cells images.
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - alexisjapas
    - goanpeca
    - jaimergp
